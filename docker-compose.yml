version: '3.8'

services:
  ai-service:
    build:
      context: ./apps/ai-service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ./apps/ai-service:/app

  backend:
    build:
      context: ./apps/backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - AI_SERVICE_URL=http://ai-service:8000
    volumes:
      - ./apps/backend:/app
      - /app/node_modules
    depends_on:
      - ai-service

  frontend:
    build:
      context: ./apps/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001/api
      - VITE_AI_SERVICE_URL=http://localhost:8000
    volumes:
      - ./apps/frontend:/app
      - /app/node_modules
    depends_on:
      - backend
